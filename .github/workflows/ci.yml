name: CI

on:
  push:
    branches: [master, 'claude/**']
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Unit tests
        run: npm test

      - name: Integration tests
        run: npm run test:integration

      - name: Hook dispatcher tests
        run: npm run test:hooks
